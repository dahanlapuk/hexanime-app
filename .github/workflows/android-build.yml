name: Build Android APK

on:
  push:
    branches: [ main ] # Triger otomatis setiap push ke main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web App (Vite)
        env:
          VITE_GDRIVE_API_KEY: ${{ secrets.VITE_GDRIVE_API_KEY }} # Suntik secret dari brankas GitHub
        run: npm run build

      - name: Setup & Sync Capacitor Android
        run: |
          # Install CLI secara lokal di runner agar npx tidak bingung
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # Inisialisasi platform android jika folder belum ada
          if [ ! -d "android" ]; then
            npx @capacitor/cli add android
          fi
          
          # Sinkronisasi build Vite ke proyek Android
          npx @capacitor/cli sync android

      - name: Patch Android Permissions
        run: bash scripts/patch-android-manifest.sh

      - name: Build Android APK (Gradle)
        run: |
          cd android
          chmod +x gradlew # Kasih izin eksekusi ke wrapper Gradle
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Hexanime-Beta-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk